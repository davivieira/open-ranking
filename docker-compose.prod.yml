# Production overrides. Optional .env.prod overrides these defaults.
# Defaults (local prod): postgres/postgres, admin@open-ranking.com / admin123
# For Oracle Cloud: copy .env.prod.example to .env.prod and set real secrets.
services:
  db:
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-open_ranking_prod}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - db_data_prod:/var/lib/postgresql/data
    ports: []  # Don't expose DB to host in prod (security)

  backend:
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-open_ranking_prod}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-prod}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-admin@open-ranking.com}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-admin123}

volumes:
  db_data_prod:
