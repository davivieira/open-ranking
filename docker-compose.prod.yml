services:
  db:
    environment:
      POSTGRES_DB: open_ranking_prod
      POSTGRES_USER: open_ranking
      POSTGRES_PASSWORD: change-this-prod-password
    volumes:
      - db_data_prod:/var/lib/postgresql/data

  backend:
    environment:
      DATABASE_URL: postgresql://open_ranking:change-this-prod-password@db:5432/open_ranking_prod
      JWT_SECRET_KEY: change-me-in-prod
      INITIAL_ADMIN_EMAIL: admin@open-ranking.com
      INITIAL_ADMIN_PASSWORD: change-this-prod-password

volumes:
  db_data_prod:

